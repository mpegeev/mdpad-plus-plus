<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mdpad++ — design canvas</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="editor.css" />
    <style>
      body {
        background: var(--canvas-bg, #f0eee9);
        transition: background 240ms ease;
      }
      /* Force light theme inside canvas frames */
      .frame {
        background: var(--bg-base);
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
      }
      .frame iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* ============== MOOD presets — recolor every frame at once ============== */
      /* Each mood overrides the design tokens that ripple through every artboard. */
      body[data-mood="anthropic"] {
        --canvas-bg: #ece8df;
      }
      body[data-mood="inkwell"] {
        --canvas-bg: #1a1815;
      }
      body[data-mood="inkwell"] .frame {
        --bg-base: #1c1b18;
        --bg-elevated: #232220;
        --bg-overlay: #2a2826;
        --bg-hover: #2f2d2a;
        --bg-active: #353330;
        --bg-selection: #4a4530;
        --fg-primary: #ebe9e0;
        --fg-secondary: #9a978c;
        --fg-tertiary: #6b6960;
        --border-subtle: #2a2826;
        --border-default: #3a3733;
        --border-strong: #5a564f;
        --accent: #ebe9e0;
        --accent-hover: #ffffff;
        --accent-muted: rgba(235, 233, 224, 0.1);
        --accent-fg: #1c1b18;
        --syntax-heading: #b39ed4;
        --syntax-code: #d99a7a;
        --syntax-link: #7aa6c4;
        --syntax-marker: #5a564f;
        --shadow-overlay:
          0 1px 2px rgba(0, 0, 0, 0.2), 0 8px 24px rgba(0, 0, 0, 0.4),
          0 0 0 1px var(--border-default);
      }
      body[data-mood="workshop"] {
        --canvas-bg: #d8dde0;
      }
      body[data-mood="workshop"] .frame {
        --bg-base: #f3f4f5;
        --bg-elevated: #e8eaec;
        --bg-overlay: #ffffff;
        --bg-hover: #dee0e3;
        --bg-active: #d3d6d9;
        --bg-selection: #c4d0db;
        --fg-primary: #111418;
        --fg-secondary: #5a626a;
        --fg-tertiary: #8a9099;
        --border-subtle: #dde0e3;
        --border-default: #c4c8cc;
        --border-strong: #8a9099;
        --accent: #2c5872;
        --accent-hover: #1e4258;
        --accent-muted: rgba(44, 88, 114, 0.12);
        --accent-fg: #ffffff;
        --syntax-heading: #2c5872;
        --syntax-code: #a85a3e;
        --syntax-link: #2c5872;
      }
      body[data-mood="midnight-coral"] {
        --canvas-bg: #1f1814;
      }
      body[data-mood="midnight-coral"] .frame {
        --bg-base: #221a16;
        --bg-elevated: #2a201b;
        --bg-overlay: #322620;
        --bg-hover: #38291f;
        --bg-active: #422f23;
        --bg-selection: #5a3a26;
        --fg-primary: #f5e5d5;
        --fg-secondary: #a89687;
        --fg-tertiary: #756558;
        --border-subtle: #2e221c;
        --border-default: #3f2f25;
        --border-strong: #5a463a;
        --accent: #d97757;
        --accent-hover: #f08866;
        --accent-muted: rgba(217, 119, 87, 0.16);
        --accent-fg: #1c1b18;
        --syntax-heading: #e89876;
        --syntax-code: #f0a87a;
        --syntax-link: #c9a373;
        --syntax-marker: #5a463a;
        --shadow-overlay:
          0 1px 2px rgba(0, 0, 0, 0.3), 0 12px 32px rgba(0, 0, 0, 0.5),
          0 0 0 1px var(--border-default);
      }

      /* ============== VOICE — typography personality ============== */
      /* Editorial: long-form serif, bigger prose */
      body[data-voice="editorial"] .frame {
        --font-prose: "Source Serif 4", "Charter", Georgia, serif;
        --font-ui: "Source Serif 4", Georgia, serif;
        --fs-base: 14px;
        --prose-max-width: 64ch;
      }
      body[data-voice="editorial"] .frame .mdblock--p,
      body[data-voice="editorial"] .frame .mdblock--blockquote {
        font-size: 17px;
        line-height: 1.75;
      }
      body[data-voice="editorial"] .frame .mdblock--h1 {
        font-size: 42px;
        letter-spacing: -0.02em;
      }
      body[data-voice="editorial"] .frame .mdblock--h2 {
        font-size: 28px;
      }
      body[data-voice="editorial"] .frame .mdblock--blockquote {
        font-style: italic;
      }

      /* Manuscript: monospace everywhere, draft-like */
      body[data-voice="manuscript"] .frame {
        --font-prose: "JetBrains Mono", ui-monospace, monospace;
        --font-ui: "JetBrains Mono", ui-monospace, monospace;
        --fs-base: 12px;
        --prose-max-width: 78ch;
      }
      body[data-voice="manuscript"] .frame .mdblock--p,
      body[data-voice="manuscript"] .frame .mdblock--blockquote,
      body[data-voice="manuscript"] .frame li {
        font-size: 13px;
        line-height: 1.65;
        letter-spacing: -0.01em;
      }
      body[data-voice="manuscript"] .frame .mdblock--h1,
      body[data-voice="manuscript"] .frame .mdblock--h2 {
        font-weight: 500;
        letter-spacing: -0.02em;
      }
      body[data-voice="manuscript"] .frame .mdblock--h1::before {
        content: "# ";
        opacity: 0.4;
      }
      body[data-voice="manuscript"] .frame .mdblock--h2::before {
        content: "## ";
        opacity: 0.4;
      }
      body[data-voice="manuscript"] .frame .mdblock--blockquote::before {
        content: "> ";
        opacity: 0.4;
      }

      /* Studio: clean modernist sans */
      body[data-voice="studio"] .frame {
        --font-prose: "Styrene B", -apple-system, "Inter", sans-serif;
        --font-ui: "Styrene B", -apple-system, "Inter", sans-serif;
      }
      body[data-voice="studio"] .frame .mdblock--h1,
      body[data-voice="studio"] .frame .mdblock--h2 {
        font-weight: 600;
        letter-spacing: -0.025em;
      }
      body[data-voice="studio"] .frame .mdblock--p {
        line-height: 1.6;
      }

      /* ============== TEXTURE — physical character ============== */
      /* Grain overlay on the canvas surface itself, plus subtle paper feel inside frames */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9000;
        opacity: 0;
        transition: opacity 240ms ease;
      }
      body[data-texture="paper"]::before {
        opacity: 0.35;
        mix-blend-mode: multiply;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.38  0 0 0 0 0.32  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }
      body[data-texture="halftone"]::before {
        opacity: 0.22;
        mix-blend-mode: multiply;
        background-image: radial-gradient(
          circle at center,
          #000 0.7px,
          transparent 1.4px
        );
        background-size: 4px 4px;
      }
      body[data-texture="halftone"][data-mood="inkwell"]::before,
      body[data-texture="halftone"][data-mood="midnight-coral"]::before {
        mix-blend-mode: screen;
        background-image: radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.6) 0.7px,
          transparent 1.4px
        );
      }
      body[data-texture="screen"]::before {
        opacity: 0.55;
        mix-blend-mode: multiply;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.22) 0 1px,
          transparent 1px 3px
        );
      }
      body[data-texture="screen"][data-mood="inkwell"]::before,
      body[data-texture="screen"][data-mood="midnight-coral"]::before {
        mix-blend-mode: screen;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.08) 0 1px,
          transparent 1px 3px
        );
      }

      /* Vignette around frames in dark moods — brings physicality */
      body[data-mood="inkwell"] .frame,
      body[data-mood="midnight-coral"] .frame {
        box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.25);
      }

      /* ============== TWEAKS PANEL ============== */
      .canvas-tweaks {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10000;
        width: 280px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px) saturate(1.4);
        -webkit-backdrop-filter: blur(14px) saturate(1.4);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 12px 32px rgba(0, 0, 0, 0.16);
        font-family:
          "Styrene B",
          -apple-system,
          "Helvetica Neue",
          sans-serif;
        color: #191919;
        overflow: hidden;
        transition:
          transform 200ms cubic-bezier(0.2, 0, 0, 1),
          opacity 200ms;
      }
      body[data-mood="inkwell"] .canvas-tweaks,
      body[data-mood="midnight-coral"] .canvas-tweaks {
        background: rgba(28, 27, 24, 0.86);
        border-color: rgba(255, 255, 255, 0.1);
        color: #ebe9e0;
      }
      .canvas-tweaks__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px 10px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b6960;
      }
      body[data-mood="inkwell"] .canvas-tweaks__header,
      body[data-mood="midnight-coral"] .canvas-tweaks__header {
        border-bottom-color: rgba(255, 255, 255, 0.08);
        color: #9a978c;
      }
      .canvas-tweaks__close {
        background: transparent;
        border: 0;
        cursor: pointer;
        color: inherit;
        padding: 0;
        font-size: 16px;
        line-height: 1;
        opacity: 0.6;
      }
      .canvas-tweaks__close:hover {
        opacity: 1;
      }
      .canvas-tweaks__body {
        padding: 8px 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .ct-section__label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #9a978c;
        margin-bottom: 8px;
      }
      body[data-mood="inkwell"] .ct-section__label,
      body[data-mood="midnight-coral"] .ct-section__label {
        color: #756558;
      }

      /* Mood swatches — colored discs preview the palette */
      .ct-mood-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }
      .ct-mood {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px 4px 5px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        transition: background 120ms;
      }
      .ct-mood:hover {
        background: rgba(0, 0, 0, 0.04);
      }
      body[data-mood="inkwell"] .ct-mood:hover,
      body[data-mood="midnight-coral"] .ct-mood:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .ct-mood--active {
        background: rgba(0, 0, 0, 0.06) !important;
        border-color: rgba(0, 0, 0, 0.14);
      }
      body[data-mood="inkwell"] .ct-mood--active,
      body[data-mood="midnight-coral"] .ct-mood--active {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: rgba(255, 255, 255, 0.16);
      }
      .ct-mood__swatch {
        width: 32px;
        height: 24px;
        border-radius: 4px;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
      }
      .ct-mood__swatch::after {
        content: "";
        position: absolute;
        right: 3px;
        bottom: 3px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--swatch-accent);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.4);
      }
      .ct-mood__label {
        font-size: 10px;
        line-height: 1.1;
        text-align: center;
        color: inherit;
        font-weight: 500;
      }

      /* Voice — text specimens */
      .ct-voice-stack {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ct-voice {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 10px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.015);
        cursor: pointer;
        transition: all 120ms;
        text-align: left;
        width: 100%;
      }
      body[data-mood="inkwell"] .ct-voice,
      body[data-mood="midnight-coral"] .ct-voice {
        background: rgba(255, 255, 255, 0.03);
        border-color: rgba(255, 255, 255, 0.08);
      }
      .ct-voice:hover {
        border-color: rgba(0, 0, 0, 0.2);
      }
      .ct-voice--active {
        background: rgba(0, 0, 0, 0.06) !important;
        border-color: rgba(0, 0, 0, 0.3) !important;
      }
      body[data-mood="inkwell"] .ct-voice--active,
      body[data-mood="midnight-coral"] .ct-voice--active {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: rgba(255, 255, 255, 0.3) !important;
      }
      .ct-voice__sample {
        font-size: 16px;
        line-height: 1;
        flex-shrink: 0;
      }
      .ct-voice__sample--editorial {
        font-family: "Source Serif 4", Georgia, serif;
        font-style: italic;
      }
      .ct-voice__sample--manuscript {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
      }
      .ct-voice__sample--studio {
        font-family:
          "Styrene B",
          -apple-system,
          sans-serif;
        font-weight: 600;
      }
      .ct-voice__name {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .ct-voice__hint {
        font-size: 10px;
        color: #9a978c;
        flex: 1;
        text-align: right;
      }
      body[data-mood="inkwell"] .ct-voice__hint,
      body[data-mood="midnight-coral"] .ct-voice__hint {
        color: #756558;
      }

      /* Texture — segmented with mini visual */
      .ct-texture-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
      }
      .ct-texture {
        position: relative;
        height: 40px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 6px;
        cursor: pointer;
        overflow: hidden;
        background: #faf9f5;
        transition: all 120ms;
      }
      body[data-mood="inkwell"] .ct-texture,
      body[data-mood="midnight-coral"] .ct-texture {
        background: #2a2826;
        border-color: rgba(255, 255, 255, 0.08);
      }
      .ct-texture:hover {
        border-color: rgba(0, 0, 0, 0.25);
      }
      .ct-texture--active {
        border-color: rgba(0, 0, 0, 0.4) !important;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.15);
      }
      body[data-mood="inkwell"] .ct-texture--active,
      body[data-mood="midnight-coral"] .ct-texture--active {
        border-color: rgba(255, 255, 255, 0.4) !important;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.15);
      }
      .ct-texture__viz {
        position: absolute;
        inset: 0;
      }
      .ct-texture--none .ct-texture__viz {
        background: transparent;
      }
      .ct-texture--paper .ct-texture__viz {
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.3  0 0 0 0 0.28  0 0 0 0 0.22  0 0 0 0.6 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        opacity: 0.7;
      }
      .ct-texture--halftone .ct-texture__viz {
        background-image: radial-gradient(
          circle at center,
          #444 0.7px,
          transparent 1.2px
        );
        background-size: 4px 4px;
      }
      body[data-mood="inkwell"] .ct-texture--halftone .ct-texture__viz,
      body[data-mood="midnight-coral"] .ct-texture--halftone .ct-texture__viz {
        background-image: radial-gradient(
          circle at center,
          #aaa 0.7px,
          transparent 1.2px
        );
      }
      .ct-texture--screen .ct-texture__viz {
        background-image: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.4) 0 1px,
          transparent 1px 3px
        );
      }
      body[data-mood="inkwell"] .ct-texture--screen .ct-texture__viz,
      body[data-mood="midnight-coral"] .ct-texture--screen .ct-texture__viz {
        background-image: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.18) 0 1px,
          transparent 1px 3px
        );
      }
      .ct-texture__name {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 3px;
        text-align: center;
        font-size: 9px;
        color: #6b6960;
        font-weight: 500;
        text-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
      }
      body[data-mood="inkwell"] .ct-texture__name,
      body[data-mood="midnight-coral"] .ct-texture__name {
        color: #ebe9e0;
        text-shadow: 0 0 4px rgba(0, 0, 0, 0.6);
      }

      /* Toggle button when panel hidden */
      .canvas-tweaks-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10000;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        color: #191919;
      }
      body[data-mood="inkwell"] .canvas-tweaks-toggle,
      body[data-mood="midnight-coral"] .canvas-tweaks-toggle {
        background: rgba(28, 27, 24, 0.9);
        border-color: rgba(255, 255, 255, 0.12);
        color: #ebe9e0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="canvas-app.jsx"></script>
    <script type="text/babel" src="canvas-tweaks.jsx"></script>
    <script type="text/babel">
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(
        <>
          <CanvasApp />
          <CanvasTweaks />
        </>,
      );
    </script>
  </body>
</html>
